version: "3.8"

services:
  # ============================================
  # Database Service (PostgreSQL)
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: trinity_asset_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-trinity_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-trinity_asset}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "127.0.0.1:5432:5432"  # Only expose to localhost for security
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - trinity_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trinity_admin} -d ${DB_NAME:-trinity_asset}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Backend API Service (NestJS)
  # ============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: triniti_asset_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-12h}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      # WhatsApp Integration (optional)
      WA_API_URL: ${WA_API_URL:-}
      WA_API_KEY: ${WA_API_KEY:-}
      WA_GROUP_LOGISTIC_ID: ${WA_GROUP_LOGISTIC_ID:-}
      WA_GROUP_PURCHASE_ID: ${WA_GROUP_PURCHASE_ID:-}
      WA_GROUP_MANAGEMENT_ID: ${WA_GROUP_MANAGEMENT_ID:-}
    networks:
      - trinity_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================
  # Frontend Web Server (Nginx)
  # ============================================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
        VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
    container_name: trinity_asset_web
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL Certificates (read-only)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Custom nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - trinity_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ============================================
  # Database GUI (Optional - Development Only)
  # ============================================
  # Uncomment untuk development/debugging
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: trinity_pgadmin
  #   restart: always
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@trinity.com}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "127.0.0.1:5050:80"  # Only expose to localhost
  #   depends_on:
  #     - db
  #   networks:
  #     - trinity_network
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin

# ============================================
# Networks
# ============================================
networks:
  trinity_network:
    driver: bridge
    name: trinity_network

